<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradientes em CSS</title>
    
        <style>
            *{
                /* Usa-se "*" para selecionar todos os elementos , ou seja, uma coonfiguração global */

                height: 100%;
            }
            /*Representação por Gradientes */
        /*Linear Gradient: Gradiente Linear */
        /*Radial Gradient: Gradiente Radial */
        /*Conic Gradient: Gradiente Cônico */


        body{
            background-image: linear-gradient(to bottom, #5031CD 1%, #8837B0,#BA3B96,#EB516B,#FF883A,#FBD13F);

        }
        h1{
           color: rgb(255, 255, 255);

           }
        </style>
   
</head>
<body>
    <h1>Testando Gradientes em CSS</h1>
    
</body>
</html>
