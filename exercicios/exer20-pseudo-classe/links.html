<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: rgb(255, 33, 33);
            text-decoration: none;
            font-weight: bold;
        }
       
        a:hover{
            color: rgb(8, 5, 207);
            text-decoration: underline;

        }
         /*
         - A pseudo-classe "a:visited" é usada para marcar os links que já foram visitados pelo usuário. No exemplo, a cor dos links visitados é definida como preto (rgb(0, 0, 0)).
         */
       a:visited{
        color: rgb(0, 0, 0);
       }

       .especial{
        background-color: skyblue;
       }

       .especial::before{
        /*
        - A pseudo-elemento "a::before" é usado para adicionar conteúdo antes do elemento <a>. No exemplo, o conteúdo adicionado é a string "Link: ", que será exibida antes do texto do link. 

        - lembrando, você pode adicionar qualquer conteúdo que desejar, como ícones, imagens ou texto adicional, usando a pseudo-elemento "::after"(depois) ou "::before" (antes).
        */
        content: "⇒ ";
        font-weight: normal;
        color: rgb(36, 56, 236);
       }

       .especial::after{
        /*
        - A pseudo-elemento "a::after" é usado para adicionar conteúdo antes ou após o elemento <a>. No exemplo, o conteúdo adicionado é a string " (link)", que será exibida após o texto do link. 

        - lembrando, você pode adicionar qualquer conteúdo que desejar, como ícones, imagens ou texto adicional, usando a pseudo-elemento "::after"(depois) ou "::before" (antes).
        */
        content: " ⇐";
        font-weight: normal;
        color: rgb(36, 56, 236);
       }
       /*    IMPOPTANTE
       - #  = id
       - .  = class
       - :  = pseudo-classe
       - :: = pseudo-elemento
       - >  = filho direto (children)
       */
    </style>
</head>
<body>
   <h1>Personalização de Links</h1>
   <ul>
    <li><a href="https://gustavoguanabara.github.io">Repositório GitHub</a></li>
    <li><a href="https://youtube.com/cursoemvideo/" class="especial">Canal do YouTube</a></li>
    <li><a href="https://www.cursoemvideo.com">Site do Curso em Vídeo</a></li>
   </ul>
    
</body>
</html>
