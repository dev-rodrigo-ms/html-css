<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classes</title>
    <style>
       div{
        /*
        Exemplo de pseudo-classe: hover, que é ativada quando o mouse passa por cima do elemento. No caso, a cor de fundo do elemento muda para azul quando o mouse estiver sobre ele.
        */
        display: inline-block;
        height: 200px;
        width: 200px;
        border: 1px solid black;
        text-align: center;
        background-color: lightgray;   
        margin: 5px;  
       }
       div:hover{
        background-color: blue;
       }
    </style>
</head>
<body>
    <div>01</div>
    <div>02</div>
    <div>03</div>
    
</body>
</html>
